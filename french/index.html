<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프랑스어문법1 연습</title>
<style>
  :root{
    --bg:#f5f3ee; --card:#fff; --ink:#23211c; --sub:#6f6a60; --line:#e3ded3;
    --accent:#2f6f5e; --accent2:#3a5a8c; --ok:#1f8a5b; --okbg:#e7f5ec;
    --no:#c0392b; --nobg:#fbeae8; --chip:#efe9dc; --hint:#a86b1f; --hintbg:#fbf3e3;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Helvetica Neue",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;line-height:1.6;}
  .wrap{max-width:800px;margin:0 auto;padding:20px 16px 80px;}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  h1{font-size:20px;margin:0;letter-spacing:-.3px}
  .sub{color:var(--sub);font-size:13px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:2px solid var(--line);flex-wrap:wrap}
  .tab{font-size:14px;font-weight:600;color:var(--sub);background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;padding:8px 14px;cursor:pointer}
  .tab:hover{color:var(--ink)}
  .tab.on{color:var(--accent);border-bottom-color:var(--accent)}
  .order{display:inline-flex;align-items:center;gap:6px}
  .seg{font-size:12px;border:1px solid var(--line);background:var(--card);color:var(--sub);padding:3px 9px;cursor:pointer}
  .seg#segShuffle{border-radius:6px 0 0 6px} .seg#segSeq{border-radius:0 6px 6px 0;border-left:none}
  .seg.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .filters{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .filters .lab{font-size:12px;color:var(--sub);margin-right:4px}
  .chip{font-size:12.5px;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:4px 10px;cursor:pointer;user-select:none}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px;font-size:13px;color:var(--sub)}
  .bar .score b{color:var(--ink)}
  .toggle{margin-left:auto;display:flex;gap:8px;align-items:center}
  .qhead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .qtag{display:inline-block;font-size:12px;color:var(--accent);background:var(--chip);border-radius:6px;padding:2px 9px;font-weight:600}
  .hintbtn{font-size:12px;color:var(--hint);background:var(--hintbg);border:1px solid #ecd9b3;border-radius:999px;padding:3px 10px;cursor:pointer}
  .hintbox{display:none;font-size:13px;color:var(--hint);background:var(--hintbg);border:1px dashed #e2c98f;border-radius:8px;padding:7px 11px;margin-bottom:12px}
  .qtext{font-size:16px;white-space:pre-wrap;margin-bottom:14px}
  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{display:block;text-align:left;width:100%;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:15px;cursor:pointer;transition:.12s}
  .opt:hover:not(:disabled){border-color:var(--accent)}
  .opt:disabled{cursor:default}
  .opt .line{display:flex;gap:10px;align-items:flex-start}
  .opt .num{flex:none;width:22px;height:22px;border-radius:50%;background:var(--chip);display:flex;align-items:center;justify-content:center;font-size:12.5px;color:var(--sub);margin-top:1px}
  .opt.ok{background:var(--okbg);border-color:var(--ok)}
  .opt.ok .num{background:var(--ok);color:#fff}
  .opt.no{background:var(--nobg);border-color:var(--no)}
  .opt.no .num{background:var(--no);color:#fff}
  .optipa{display:none;font-family:"DejaVu Sans Mono","Menlo","Consolas",monospace;color:var(--accent2);font-size:13px;margin-top:5px;padding-left:32px}
  .opt.revealed .optipa{display:block}
  .optr{display:none;font-size:13px;color:var(--sub);margin-top:3px;padding-left:32px}
  .opt.revealed .optr{display:block}
  .expl{margin-top:14px;border-top:1px dashed var(--line);padding-top:14px;display:none}
  .expl.show{display:block}
  .verdict{font-weight:700;margin-bottom:10px}
  .verdict.ok{color:var(--ok)} .verdict.no{color:var(--no)}
  .row{margin:10px 0}
  .k{font-size:11.5px;color:var(--sub);letter-spacing:.3px;text-transform:uppercase;margin-bottom:3px}
  .sentence{background:#faf8f2;border:1px solid var(--line);border-radius:8px;padding:10px 12px;overflow-x:auto}
  pre.align{margin:0;font-family:"DejaVu Sans Mono","Menlo","Consolas","Courier New",monospace;font-size:14.5px;line-height:1.7;white-space:pre}
  pre.align.fr{color:var(--ink)} pre.align.ipa{color:var(--accent2)}
  .trans{font-size:15px}
  table.vocab{width:100%;border-collapse:collapse;margin-top:4px;font-size:14px}
  table.vocab td{border-bottom:1px solid var(--line);padding:6px 4px;vertical-align:top}
  table.vocab td.w{font-weight:600;white-space:nowrap}
  table.vocab td.p{white-space:nowrap;font-family:"DejaVu Sans Mono","Menlo",monospace;color:var(--accent2)}
  .g{font-size:10.5px;color:#fff;border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:middle;font-weight:600}
  .g.m{background:#3a5a8c} .g.f{background:#b0568a} .g.v{background:#2f8f5b} .g.adj{background:#c8841f}
  .g.adv{background:#6b7280} .g.conj{background:#8b5c9e} .g.prep{background:#2f8f8f} .g.pron{background:#9b6a3f}
  .g.num{background:#7a8b2f} .g.expr{background:#857f74}
  .actions{display:flex;gap:10px;margin-top:16px}
  .btn{border:none;border-radius:10px;padding:11px 18px;font-size:15px;cursor:pointer;font-weight:600}
  .btn.primary{background:var(--accent);color:#fff} .btn:disabled{opacity:.4;cursor:default}
  .hint{font-size:12px;color:var(--sub);margin-top:10px}
  .empty{color:var(--sub);text-align:center;padding:30px 0}
  a.reset{color:var(--sub);font-size:12px;text-decoration:underline;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>프랑스어 연습</h1>
    <div class="sub" id="poolinfo"></div>
  </header>

  <div class="tabs" id="tabs"></div>

  <div class="panel">
    <div class="filters" id="filters"><span class="lab">강 선택</span></div>
    <div class="bar">
      <span class="score">점수 <b id="sright">0</b> / <b id="stotal">0</b></span>
      <span id="acc"></span>
      <span class="order">출제
        <button type="button" class="seg" id="segShuffle" title="누르면 출제 가능한 문제를 다시 섞습니다">섞기</button><button type="button" class="seg" id="segSeq">순서대로</button>
      </span>
      <span class="toggle">
        <label style="display:flex;gap:5px;align-items:center;cursor:pointer">
          <input type="checkbox" id="reviewChk"> <span>오답만 다시 풀기</span>
        </label>
        <a class="reset" id="resetBtn">기록 초기화</a>
      </span>
    </div>
  </div>

  <div class="panel" id="qpanel">
    <div class="qhead">
      <span class="qtag" id="qtag"></span>
      <button class="hintbtn" id="hintBtn">💡 힌트 보기</button>
    </div>
    <div class="hintbox" id="hintbox"></div>
    <div class="qtext" id="qtext"></div>
    <div class="opts" id="opts"></div>

    <div class="expl" id="expl">
      <div class="verdict" id="verdict"></div>
      <div class="row"><div class="k">근거</div><div id="why"></div></div>
      <div class="row sentence" id="rowSentence">
        <pre class="align fr" id="alignFr"></pre>
        <pre class="align ipa" id="alignIpa"></pre>
      </div>
      <div class="row" id="rowTrans"><div class="k">해석</div><div class="trans" id="trans"></div></div>
      <div class="row" id="rowVocab"><div class="k">주요 단어</div><table class="vocab" id="vocab"></table></div>
    </div>

    <div class="actions"><button class="btn primary" id="nextBtn">다음 문제 →</button></div>
    <div class="hint">단축키: 1·2·3·4 답 선택, Enter/→ 다음 문제, H 힌트 · 품사: 남/여(명사) 동(동사) 형(형용사) 부(부사) 접(접속사) 전(전치사) 대(대명사) 수(수사) 숙(숙어)</div>
  </div>
</div>

function load(k, d){ try{const v=JSON.parse(localStorage.getItem(k)); return v==null?d:v;}catch(e){return d;} }
function save(k, v){ try{localStorage.setItem(k, JSON.stringify(v));}catch(e){} }
function shuffle(a){ a=a.slice(); for(let k=a.length-1;k>0;k--){ const r=Math.floor(Math.random()*(k+1)); const t=a[k]; a[k]=a[r]; a[r]=t; } return a; }
function buildQueue(){ queue=shuffle(pool.map((_,i)=>i)); qPos=0; }

const fbox = $("#filters");
const tbox = $("#tabs");
function mkChip(label, val){
  const b=document.createElement("span");
  b.className="chip"+(selected.has(val)?" on":""); b.textContent=label; b.dataset.v=val;
  b.onclick=()=>toggleChip(val); fbox.appendChild(b);
}
function courseQuestions(){ return QUESTIONS.filter(q=>(q.course||"grammar1")===activeCourse); }
function buildTabs(){
  tbox.innerHTML="";
  COURSE_LIST.forEach(c=>{
    const t=document.createElement("button");
    t.className="tab"+(c.id===activeCourse?" on":""); t.type="button"; t.textContent=c.name;
    t.onclick=()=>switchCourse(c.id); tbox.appendChild(t);
  });
}
function buildChips(){
  fbox.innerHTML='<span class="lab">강 선택</span>';
  selected=new Set([0]);
  const lects=[...new Set(courseQuestions().map(q=>q.l))].sort((a,b)=>a-b);
  mkChip("전체",0); lects.forEach(n=>mkChip(n+"강",n));
}
function switchCourse(id){
  activeCourse=id; save("f1course",id); loadCourseState();
  reviewMode=false; $("#reviewChk").checked=false;
  buildTabs(); buildChips(); renderStats(); rebuildPool(); nextQ();
}
buildTabs(); buildChips();

function toggleChip(val){
  if(val===0){ selected=new Set([0]); }
  else{ selected.delete(0); if(selected.has(val))selected.delete(val); else selected.add(val); if(selected.size===0)selected=new Set([0]); }
  [...fbox.querySelectorAll(".chip")].forEach(c=>c.classList.toggle("on",selected.has(+c.dataset.v)));
  rebuildPool(); nextQ();
}
function rebuildPool(){
  let base=QUESTIONS.map((q,i)=>({...q,id:i})).filter(q=>(q.course||"grammar1")===activeCourse);
  if(!selected.has(0)) base=base.filter(q=>selected.has(q.l));
  if(reviewMode) base=base.filter(q=>wrong.has(q.id));
  pool=base; seqPos=0; buildQueue();
  const cname=(COURSE_LIST.find(c=>c.id===activeCourse)||{}).name||"";
  $("#poolinfo").textContent=cname+" · 문제 "+pool.length+"개"+(reviewMode?" (오답)":"");
}
function dispLen(s){ let n=0; for(const ch of s.normalize("NFC")){ if(!/\p{M}/u.test(ch)) n++; } return n; }
function alignFrIpa(fr, ipa){
  const clean=ipa.replace(/\//g,"").trim();
  const fw=fr.trim().split(/\s+/), iw=clean.split(/\s+/);
  if(fw.length!==iw.length) return [fr, clean];
  let l1="",l2="";
  for(let k=0;k<fw.length;k++){ const w=Math.max(dispLen(fw[k]),dispLen(iw[k]));
    l1+=fw[k]+" ".repeat(w-dispLen(fw[k])+2); l2+=iw[k]+" ".repeat(w-dispLen(iw[k])+2); }
  return [l1.replace(/\s+$/,""), l2.replace(/\s+$/,"")];
}
function nextQ(){
  $("#expl").classList.remove("show"); answered=false;
  $("#hintbox").style.display="none"; $("#hintBtn").style.display="inline-block";
  if(pool.length===0){
    $("#qtag").textContent=""; $("#opts").innerHTML=""; $("#hintBtn").style.display="none";
    const emsg=reviewMode?"오답이 없습니다. 좋아요! 👏":(courseQuestions().length===0?"이 과목의 문제가 아직 없습니다. 강별로 보내주시면 추가할게요.":"선택한 강에 문제가 없습니다.");
    $("#qtext").innerHTML='<div class="empty">'+emsg+'</div>'; return;
  }
  let q;
  if(orderMode==="sequential"){
    if(seqPos>=pool.length) seqPos=0;
    q=pool[seqPos]; curPos=seqPos+1; seqPos++;
  } else {
    if(qPos>=queue.length){ buildQueue(); if(pool.length>1&&cur&&pool[queue[0]].id===cur.id){ const t=queue[0];queue[0]=queue[1];queue[1]=t; } }
    q=pool[queue[qPos]]; curPos=qPos+1; qPos++;
  }
  cur=q;
  $("#qtag").textContent=q.l+"강 · "+curPos+"/"+pool.length; $("#qtext").innerHTML=fmt(q.q);
  const ob=$("#opts"); ob.innerHTML="";
  curOrder = shuffle(q.o.map((_,i)=>i));
  curOrder.forEach((orig,d)=>{
    const btn=document.createElement("button"); btn.className="opt"; btn.type="button";
    const ipaLine = q.oi&&q.oi[orig] ? '<div class="optipa">'+escapeHtml(q.oi[orig])+'</div>' : '';
    const trLine = q.ot&&q.ot[orig] ? '<div class="optr">'+escapeHtml(q.ot[orig])+'</div>' : '';
    btn.innerHTML='<div class="line"><span class="num">'+(d+1)+'</span><span>'+fmt(q.o[orig])+'</span></div>'+ipaLine+trLine;
    btn.onclick=()=>choose(d); ob.appendChild(btn);
  });
}
function choose(d){
  if(answered) return; answered=true;
  const orig=curOrder[d], correctDisp=curOrder.indexOf(cur.a);
  [...$("#opts").children].forEach((b,j)=>{ b.disabled=true; b.classList.add("revealed");
    if(j===correctDisp)b.classList.add("ok"); if(j===d&&orig!==cur.a)b.classList.add("no"); });
  const ok=orig===cur.a;
  stats.total++; if(ok){stats.right++; wrong.delete(cur.id);} else {wrong.add(cur.id);}
  save("f1stats_"+activeCourse,stats); save("f1wrong_"+activeCourse,[...wrong]); renderStats();
  const v=$("#verdict");
  v.textContent=ok?"정답입니다 ✓":("오답 — 정답은 "+(correctDisp+1)+"번"); v.className="verdict "+(ok?"ok":"no");
  $("#why").textContent=cur.w;
  if(cur.fr&&cur.ipa){ $("#rowSentence").style.display=""; const [l1,l2]=alignFrIpa(cur.fr,cur.ipa); $("#alignFr").textContent=l1; $("#alignIpa").textContent=l2; }
  else $("#rowSentence").style.display="none";
  if(cur.tr){ $("#rowTrans").style.display=""; $("#trans").textContent=cur.tr; } else $("#rowTrans").style.display="none";
  if(cur.v&&cur.v.length){
    $("#rowVocab").style.display=""; const vt=$("#vocab"); vt.innerHTML="";
    cur.v.forEach(([w,g,ipa,mean])=>{
      const tr=document.createElement("tr");
      const badge = POS[g] ? '<span class="g '+POS[g][1]+'">'+POS[g][0]+'</span>' : '';
      tr.innerHTML='<td class="w">'+escapeHtml(w)+badge+'</td><td class="p">/'+escapeHtml(ipa)+'/</td><td>'+escapeHtml(mean)+'</td>';
      vt.appendChild(tr);
    });
  } else $("#rowVocab").style.display="none";
  $("#expl").classList.add("show");
}
function showHint(){ if(!cur)return; $("#hintbox").textContent="개념: "+cur.c; $("#hintbox").style.display="block"; $("#hintBtn").style.display="none"; }
function renderStats(){ $("#sright").textContent=stats.right; $("#stotal").textContent=stats.total;
  $("#acc").textContent=stats.total?("정답률 "+Math.round(stats.right/stats.total*100)+"%"):""; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmt(s){ return escapeHtml(s).replace(/\{u\}/g,"<u>").replace(/\{\/u\}/g,"</u>"); }

$("#nextBtn").onclick=nextQ; $("#hintBtn").onclick=showHint;
$("#reviewChk").onchange=e=>{ reviewMode=e.target.checked; rebuildPool(); nextQ(); };
$("#resetBtn").onclick=()=>{ if(confirm("이 과목의 점수와 오답 기록을 지울까요?")){ stats={right:0,total:0}; wrong=new Set(); save("f1stats_"+activeCourse,stats); save("f1wrong_"+activeCourse,[]); renderStats(); rebuildPool(); nextQ(); } };
document.addEventListener("keydown",e=>{
  if(["1","2","3","4"].includes(e.key)&&!answered){ const b=$("#opts").children[+e.key-1]; if(b)b.click(); }
  else if(e.key==="Enter"||e.key==="ArrowRight"){ nextQ(); } else if(e.key==="h"||e.key==="H"){ showHint(); }
});
function setOrder(m){ orderMode=m; save("f1order",m); seqPos=0;
  $("#segShuffle").classList.toggle("on",m==="shuffle"); $("#segSeq").classList.toggle("on",m==="sequential");
  if(m==="shuffle") buildQueue();
  nextQ(); }
$("#segShuffle").onclick=()=>setOrder("shuffle");
$("#segSeq").onclick=()=>setOrder("sequential");
$("#segShuffle").classList.toggle("on",orderMode==="shuffle"); $("#segSeq").classList.toggle("on",orderMode==="sequential");
renderStats(); rebuildPool(); nextQ();
</script>
</body>
</html>
